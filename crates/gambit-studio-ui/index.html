<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gambit · chess data terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
        :root {
            color-scheme: dark;
            --void: #06070b;
            --void-2: #0a0c12;
            --surface: rgba(17, 19, 26, 0.72);
            --surface-solid: #11131a;
            --surface-raised: rgba(23, 27, 38, 0.85);
            --surface-hover: rgba(124, 92, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #f0f3fa;
            --muted: #8b95a8;
            --muted-2: #5c6578;
            --accent: #7c5cff;
            --accent-2: #5a3fd4;
            --accent-cyan: #22d3ee;
            --accent-glow: rgba(124, 92, 255, 0.45);
            --cyan-glow: rgba(34, 211, 238, 0.35);
            --good: #34d399;
            --good-dim: rgba(52, 211, 153, 0.15);
            --warn: #fbbf24;
            --warn-dim: rgba(251, 191, 36, 0.12);
            --bad: #fb7185;
            --bad-dim: rgba(251, 113, 133, 0.12);
            --sq-dark: #1a1f2b;
            --sq-light: #242b3a;
            --last-move: rgba(124, 92, 255, 0.28);
            --legal-target: rgba(34, 211, 238, 0.32);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --shadow-panel: 0 4px 24px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--border);
            --shadow-glow: 0 0 40px var(--accent-glow);
            --font-display: "Syne", system-ui, sans-serif;
            --font-body: "DM Sans", system-ui, sans-serif;
            --font-mono: "JetBrains Mono", ui-monospace, monospace;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: var(--font-body);
            background: var(--void);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(124, 92, 255, 0.18), transparent 50%),
                radial-gradient(ellipse 60% 40% at 90% 10%, rgba(34, 211, 238, 0.1), transparent 45%),
                radial-gradient(ellipse 50% 30% at 50% 100%, rgba(124, 92, 255, 0.08), transparent 50%),
                var(--void);
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.35;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .mono { font-family: var(--font-mono); font-size: 0.82em; letter-spacing: -0.02em; }

        /* ── Brand ── */
        .logo {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }
        .logo-mark {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px var(--accent-glow));
        }
        .logo-mark svg { width: 100%; height: 100%; display: block; }
        .logo-text { position: relative; }
        .logo-wordmark {
            margin: 0;
            font-family: var(--font-display);
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            text-transform: lowercase;
            line-height: 1;
            background: linear-gradient(135deg, var(--text) 20%, var(--accent) 55%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-tagline {
            margin: 0.2rem 0 0;
            color: var(--muted);
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .health-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(12px);
        }
        .health-badge.ok { color: var(--good); border-color: rgba(52, 211, 153, 0.25); }
        .health-badge.err { color: var(--bad); border-color: rgba(251, 113, 133, 0.25); }
        .health-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 8px currentColor;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .health-badge.err .health-dot { animation: none; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* ── Shell ── */
        .studio {
            max-width: 1320px;
            margin: 0 auto;
            padding: 1.25rem 1.5rem 3rem;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 0.75rem 0 1.25rem;
            margin-bottom: 0.5rem;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav {
            display: flex;
            gap: 0.25rem;
            padding: 0.25rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(16px);
        }
        .nav button, .actions button, .form-row button, .icon-btn, .chip-btn, .text-btn, .promo-btn, .bench-run-btn {
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 500;
            background: transparent;
            color: var(--muted);
            border: none;
            border-radius: var(--radius-sm);
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s var(--ease-out);
        }
        .nav button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav button.active {
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .actions button, .form-row button, .bench-run-btn {
            background: var(--surface-raised);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .actions button:hover, .form-row button:hover, .bench-run-btn:hover:not(:disabled) {
            border-color: var(--border-strong);
            background: rgba(255,255,255,0.06);
            transform: translateY(-1px);
        }
        .actions button:active, .form-row button:active { transform: translateY(0); }
        .actions button.primary, .bench-run-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #6366f1 50%, var(--accent-cyan) 100%);
            background-size: 200% 100%;
            color: #fff;
            border: none;
            font-weight: 600;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .actions button.primary:hover, .bench-run-btn:hover:not(:disabled) {
            background-position: 100% 0;
            box-shadow: 0 6px 28px var(--accent-glow), 0 0 20px var(--cyan-glow);
        }
        .bench-run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .main { animation: page-in 0.4s var(--ease-out); }
        @keyframes page-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.35rem 1.5rem;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-panel);
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .panel:hover { border-color: var(--border-strong); }
        .panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.1rem;
        }
        .panel h2, .panel h3 {
            margin: 0;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.02em;
        }
        .panel-desc {
            margin: 0.25rem 0 0;
            color: var(--muted);
            font-size: 0.82rem;
        }

        /* ── Dashboard grid ── */
        .dash-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr 1fr;
        }
        .dash-full { grid-column: 1 / -1; }
        @media (max-width: 900px) {
            .dash-grid { grid-template-columns: 1fr; }
        }

        /* ── Stat cards ── */
        .source-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem; }
        .source-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.9rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s var(--ease-out);
            background: rgba(0,0,0,0.15);
        }
        .source-card:hover {
            border-color: rgba(124, 92, 255, 0.35);
            background: var(--surface-hover);
            transform: translateX(2px);
        }
        .source-card.active {
            border-color: var(--accent);
            background: linear-gradient(90deg, rgba(124,92,255,0.12), transparent);
            box-shadow: inset 3px 0 0 var(--accent), 0 0 24px rgba(124,92,255,0.08);
        }
        .source-card strong {
            font-weight: 600;
            font-size: 0.92rem;
            display: block;
        }
        .source-stats {
            display: flex;
            gap: 0.75rem;
            flex-shrink: 0;
        }
        .stat-pill {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.1rem;
        }
        .stat-pill .val {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text);
        }
        .stat-pill .lbl {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted-2);
        }

        /* ── Forms ── */
        .form-stack { display: flex; flex-direction: column; gap: 0.85rem; }
        .form-field { display: flex; flex-direction: column; gap: 0.35rem; }
        .form-field label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }
        .form-field input {
            font-family: var(--font-body);
            font-size: 0.9rem;
            background: var(--void-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            padding: 0.65rem 0.85rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.18);
        }
        .form-row { display: flex; gap: 0.65rem; align-items: stretch; }
        .form-row input {
            flex: 1;
            font-family: var(--font-body);
            background: var(--void-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            padding: 0.65rem 0.85rem;
        }
        .form-row input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.18);
        }
        .actions { display: flex; gap: 0.65rem; margin-top: 0.25rem; }

        /* ── Toast & job ── */
        .toast {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.85rem;
            padding: 0.65rem 0.9rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            background: rgba(124, 92, 255, 0.1);
            border: 1px solid rgba(124, 92, 255, 0.25);
            color: var(--accent-cyan);
            animation: toast-in 0.3s var(--ease-out);
        }
        @keyframes toast-in {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .job-card {
            margin-top: 1rem;
            padding: 1.1rem 1.2rem;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, rgba(124,92,255,0.08), rgba(34,211,238,0.04));
            border: 1px solid rgba(124, 92, 255, 0.22);
        }
        .job-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.65rem;
        }
        .job-title { font-weight: 600; font-size: 0.9rem; }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-pill.running { background: var(--warn-dim); color: var(--warn); }
        .status-pill.complete { background: var(--good-dim); color: var(--good); }
        .status-pill.failed { background: var(--bad-dim); color: var(--bad); }
        .status-pill::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        .status-pill.running::before { animation: pulse-dot 1.5s infinite; }

        .job-message {
            margin: 0 0 0.85rem;
            color: var(--muted);
            font-size: 0.85rem;
            line-height: 1.45;
        }
        .job-hint {
            margin: 0 0 0.75rem;
            padding: 0.65rem 0.85rem;
            background: var(--warn-dim);
            border: 1px solid rgba(251, 191, 36, 0.25);
            border-radius: var(--radius-sm);
            color: var(--warn);
            font-size: 0.82rem;
            line-height: 1.45;
        }
        .job-live {
            margin: 0 0 0.75rem;
            color: var(--good);
            font-size: 0.85rem;
        }
        .job-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 0.85rem;
        }
        .job-stat {
            padding: 0.6rem 0.75rem;
            background: rgba(0,0,0,0.25);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .job-stat .lbl {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted-2);
            margin-bottom: 0.2rem;
        }
        .job-stat .val {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 500;
        }
        .job-stat .val.accent { color: var(--good); }

        .progress-wrap { margin-top: 0.5rem; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--muted);
            margin-bottom: 0.35rem;
        }
        .progress-track {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--accent), var(--accent-cyan));
            transition: width 0.6s var(--ease-out);
            position: relative;
        }
        .progress-fill.indeterminate {
            width: 30% !important;
            animation: progress-indeterminate 1.8s ease-in-out infinite;
        }
        @keyframes progress-indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }
        .progress-fill::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .hint {
            margin: 0.85rem 0 0;
            color: var(--muted-2);
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .hint::before { content: "◎"; color: var(--accent); font-size: 0.65rem; }

        /* ── Shards ── */
        .shard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.65rem;
        }
        .shard {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            background: rgba(0,0,0,0.2);
            transition: transform 0.2s var(--ease-out), box-shadow 0.2s, border-color 0.2s;
        }
        .shard:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .shard-label {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .shard-status {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .shard-games { color: var(--muted); font-size: 0.78rem; }
        .shard-error { color: var(--bad); font-size: 0.72rem; line-height: 1.3; }
        .status-complete { border-color: rgba(52, 211, 153, 0.35); background: var(--good-dim); }
        .status-complete .shard-status { color: var(--good); }
        .status-failed { border-color: rgba(251, 113, 133, 0.35); background: var(--bad-dim); }
        .status-failed .shard-status { color: var(--bad); }
        .status-ingesting, .status-downloading {
            border-color: rgba(251, 191, 36, 0.35);
            background: var(--warn-dim);
            animation: shard-pulse 2.5s ease-in-out infinite;
        }
        .status-ingesting .shard-status, .status-downloading .shard-status { color: var(--warn); }
        @keyframes shard-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
            50% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.12); }
        }
        .status-pending { opacity: 0.65; }
        .status-pending .shard-status { color: var(--muted-2); }

        /* ── Games ── */
        .games-layout {
            display: grid;
            grid-template-columns: minmax(240px, 280px) 1fr minmax(220px, 260px);
            gap: 1.25rem;
            outline: none;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .games-layout:hover { border-color: transparent; }
        .games-sidebar, .games-meta {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-panel);
        }
        .games-board-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.85rem;
        }
        .board-toolbar {
            display: flex;
            gap: 0.5rem;
            align-self: stretch;
            justify-content: space-between;
            align-items: center;
        }
        .board-hint {
            font-size: 0.72rem;
            color: var(--muted-2);
        }
        .icon-btn {
            padding: 0.45rem 0.85rem;
            font-size: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .icon-btn:hover {
            border-color: var(--accent);
            color: var(--accent-cyan);
            box-shadow: 0 0 16px rgba(124, 92, 255, 0.15);
        }
        .chip-btn {
            background: rgba(124, 92, 255, 0.15);
            border: 1px solid rgba(124, 92, 255, 0.35);
            color: var(--accent-cyan);
            font-size: 0.78rem;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
        }
        .text-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.78rem;
        }
        .text-btn:hover { color: var(--accent-cyan); }

        .game-list { list-style: none; padding: 0; margin: 0.75rem 0 0; max-height: 520px; overflow-y: auto; }
        .game-list li {
            padding: 0.75rem;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            margin-bottom: 0.35rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .game-list li:hover {
            background: var(--surface-hover);
            border-color: var(--border);
        }
        .game-list li.active {
            background: rgba(124, 92, 255, 0.12);
            border-color: rgba(124, 92, 255, 0.35);
        }
        .game-list li strong { display: block; font-size: 0.88rem; margin-bottom: 0.2rem; }
        .game-list li span { color: var(--muted); font-size: 0.78rem; margin-right: 0.5rem; }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--muted);
        }
        .empty-state .empty-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.4;
        }
        .empty-state p { margin: 0; font-size: 0.85rem; }

        .transport {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            backdrop-filter: blur(12px);
        }
        .ply-indicator { color: var(--muted); font-size: 0.82rem; min-width: 4rem; text-align: center; }
        .fen-display {
            background: var(--void-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.65rem 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 0.72rem;
            margin-top: 0.5rem;
            text-align: left;
            width: 100%;
            max-width: 520px;
        }
        .game-info { margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .matchup {
            font-family: var(--font-display);
            font-size: 1.05rem;
            margin: 0 0 0.5rem;
            line-height: 1.3;
        }
        .result-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(124,92,255,0.25), rgba(34,211,238,0.15));
            color: var(--accent-cyan);
            padding: 0.2rem 0.65rem;
            border-radius: 999px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(34, 211, 238, 0.25);
        }
        .event { color: var(--muted); font-size: 0.82rem; margin: 0.5rem 0 0; }
        .movetext {
            list-style: none;
            padding: 0;
            max-height: 420px;
            overflow-y: auto;
            margin: 0;
            scrollbar-width: thin;
        }
        .movetext li {
            padding: 0.4rem 0.65rem;
            color: var(--muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            transition: background 0.12s, color 0.12s;
            display: flex;
            gap: 0.5rem;
        }
        .movetext li .move-num {
            color: var(--muted-2);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            min-width: 1.5rem;
        }
        .movetext li:hover { background: var(--surface-hover); color: var(--text); }
        .movetext li.active {
            color: var(--accent-cyan);
            font-weight: 600;
            background: rgba(34, 211, 238, 0.08);
            border-left: 2px solid var(--accent-cyan);
        }

        /* ── Chess board ── */
        .board-wrap {
            width: 100%;
            max-width: 520px;
            animation: board-enter 0.45s var(--ease-out);
        }
        @keyframes board-enter {
            from { opacity: 0; transform: scale(0.96) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            aspect-ratio: 1;
            position: relative;
            border: 2px solid var(--border-strong);
            border-radius: 10px;
            overflow: hidden;
            box-shadow:
                0 16px 48px rgba(0, 0, 0, 0.55),
                0 0 60px rgba(124, 92, 255, 0.06),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .board-square {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .sq-dark { background: var(--sq-dark); }
        .sq-light { background: var(--sq-light); }
        .sq-selected { box-shadow: inset 0 0 0 3px var(--accent); }
        .sq-target::after {
            content: "";
            position: absolute;
            width: 28%;
            height: 28%;
            border-radius: 50%;
            background: var(--legal-target);
            border: 2px solid var(--accent-cyan);
        }
        .sq-last-from, .sq-last-to {
            background-color: color-mix(in srgb, var(--sq-light) 65%, var(--last-move)) !important;
        }
        .sq-dark.sq-last-from, .sq-dark.sq-last-to {
            background-color: color-mix(in srgb, var(--sq-dark) 65%, var(--last-move)) !important;
        }
        .sq-check {
            box-shadow: inset 0 0 0 3px var(--bad);
            animation: check-pulse 1.2s ease-in-out infinite;
        }
        @keyframes check-pulse {
            0%, 100% { box-shadow: inset 0 0 0 3px var(--bad); }
            50% { box-shadow: inset 0 0 0 3px var(--bad), 0 0 20px rgba(251, 113, 133, 0.45); }
        }
        .piece-svg {
            width: 88%;
            height: 88%;
            pointer-events: none;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.5));
            transition: transform 0.1s var(--ease-spring);
        }
        .board-square:hover .piece-svg { transform: scale(1.04); }

        .anim-piece {
            position: absolute;
            width: 12.5%;
            height: 12.5%;
            left: calc(var(--from-col) * 12.5%);
            top: calc(var(--from-row) * 12.5%);
            z-index: 10;
            pointer-events: none;
            animation: slide-piece 0.22s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes slide-piece {
            from { transform: translate(0, 0); }
            to { transform: translate(var(--dx), var(--dy)); }
        }
        .board-shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .promo-picker {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            padding: 0.65rem;
            background: var(--surface-raised);
            border-radius: var(--radius-md);
            border: 1px solid rgba(124, 92, 255, 0.35);
            backdrop-filter: blur(12px);
        }
        .promo-label { color: var(--muted); font-size: 0.82rem; }
        .promo-btn {
            padding: 0.25rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
        }
        .promo-btn:hover { border-color: var(--accent-cyan); transform: scale(1.05); }

        /* ── Benchmarks ── */
        .bench-intro { color: var(--muted); font-size: 0.85rem; margin: 0 0 1rem; max-width: 58ch; line-height: 1.55; }
        .bench-summary {
            margin: 1.25rem 0 0.75rem;
            padding: 0.5rem 0.75rem;
            background: rgba(124, 92, 255, 0.08);
            border: 1px solid rgba(124, 92, 255, 0.2);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            color: var(--accent-cyan);
        }
        .bench-table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        .bench-table th {
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted-2);
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        .bench-table th:nth-child(2) { width: 38%; }
        .bench-table th:nth-child(3) { width: 5rem; text-align: right; }
        .bench-table td {
            padding: 0.85rem 0.75rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .bench-table td:last-child { text-align: right; }
        .bench-name { font-weight: 600; font-size: 0.9rem; color: var(--text); }
        .bench-desc {
            margin-top: 0.25rem;
            font-size: 0.78rem;
            color: var(--muted);
            line-height: 1.45;
            max-width: 48ch;
        }
        .bench-table tr:hover td { background: var(--surface-hover); }
        .bench-table tr:last-child td { border-bottom: none; }
        .bench-bar-wrap {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .bench-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 999px;
            overflow: hidden;
            min-width: 80px;
        }
        .bench-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--good), var(--accent-cyan));
            transition: width 0.8s var(--ease-out);
        }
        .bench-latency {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            min-width: 4.5rem;
            text-align: right;
        }
        .bench-latency.fast { color: var(--good); }
        .bench-latency.slow { color: var(--warn); }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 0.4rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 960px) {
            .games-layout { grid-template-columns: 1fr; }
            .games-board-hero { order: -1; }
            .job-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>

</html>
