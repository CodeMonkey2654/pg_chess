name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Quality gates
        run: bash scripts/check.sh
      - name: Benchmark regression gate
        run: bash scripts/bench_gate.sh

  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: gambit-ingest tests
        run: cargo test -p gambit-ingest
      - name: Parse benchmark smoke test
        run: cargo run -p gambit-ingest --release -- bench-parse tests/fixtures/pgn/multi_game.pgn

  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: gambit-studio-server check
        run: cargo check -p gambit-studio-server
      - name: gambit-studio-ui wasm check
        run: cargo check -p gambit-studio-ui --target wasm32-unknown-unknown
      - name: gambit-db-wasm check
        run: cargo check -p gambit-db-wasm --target wasm32-unknown-unknown

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Python wheel
        run: pip install maturin && maturin build --release -m crates/gambit-py/Cargo.toml

  postgres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx
      - name: Initialize pgrx
        run: cargo pgrx init --pg18 download
      - name: pgrx tests
        run: cargo pgrx test pg18 -p pg_chess
